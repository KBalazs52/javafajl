<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Húsvéti Küldetés</title>

  <style>
    body {
      margin: 0;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-align: center;

      background: rgba(0, 0, 0, 0.5);
      padding: 15px 25px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="nyul.png" alt="nyuszi">
    <div class="text">Gratulálok! Legyőzted a gonosz AI nyulat! Boldog Húsvéti Ünnepeket!</div>
  </div>
</body>
</html>
